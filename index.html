<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jessberger Pump Selector</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brand-panel" aria-label="Jessberger pump selector">
        <a class="brand-logo" href="./" aria-label="Jessberger home">
          <img src="images/logo.png" alt="Jessberger" />
        </a>

        <div class="hero-copy">
          <h1>Eccentric Screw Pump Selector</h1>
        </div>
      </section>

      <section class="auth-panel" aria-label="Account access">
        <div class="auth-card">
          <div class="auth-heading">
            <h2 id="authTitle">Sign in</h2>
          </div>

          <form class="auth-form" id="authForm">
            <label>
              Email
              <input
                id="emailInput"
                name="email"
                type="email"
                autocomplete="email"
                placeholder="name@company.com"
                required
              />
            </label>

            <label>
              Password
              <input
                id="passwordInput"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
              />
            </label>

            <label class="new-password-field" id="confirmPasswordGroup">
              Confirm password
              <input
                id="confirmPasswordInput"
                name="confirmPassword"
                type="password"
                autocomplete="new-password"
                placeholder="Confirm your password"
              />
            </label>

            <button class="primary-action" type="submit" id="submitButton">
              Sign in
            </button>
          </form>

          <p class="auth-note" id="authNote">
            No public registration is available. Accounts are created by
            invitation only.
          </p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
