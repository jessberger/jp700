<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jessberger Pump Selector</title>
    <link rel="icon" type="image/png" href="images/favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="brand-panel" aria-label="Jessberger pump selector">
        <a class="brand-logo" href="./" aria-label="Jessberger home">
          <img src="images/logo.png" alt="Jessberger" />
        </a>

        <div class="hero-copy">
          <h1>Eccentric Screw Pump Selector</h1>
        </div>

        <address class="contact-block">
          <strong>Dr. Jessberger GmbH</strong>
          <span>Jaegerweg 5-7, D-85521 Ottobrunn, Germany</span>
          <a href="https://www.jesspumpen.com">www.jesspumpen.com</a>
          <a href="mailto:jp700@jesspumpen.de">jp700@jesspumpen.de</a>
          <a href="tel:+4989666633400">+49 (0) 89 66 66 33 400</a>
        </address>
      </section>

      <section class="auth-panel" aria-label="Account access">
        <div class="auth-card">
          <div class="auth-heading">
            <h2>Sign in</h2>
          </div>

          <form class="auth-form" id="authForm">
            <label>
              Username
              <input
                id="usernameInput"
                name="username"
                type="email"
                autocomplete="username"
                placeholder="name@company.com"
                required
              />
            </label>

            <label>
              Password
              <input
                id="passwordInput"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
              />
            </label>

            <button class="primary-action" type="submit" id="submitButton">
              Sign in
            </button>
          </form>

          <p class="auth-note" id="authNote">
            Access is managed manually by Jessberger.
          </p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
