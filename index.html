<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jessberger Pump Selector</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Jessberger GmbH</h1>
      <p>Eccentric Screw Pump Selector</p>
    </div>

    <img src="images/logo.jpg" alt="Jessberger Logo" class="logo" />
  </header>

  <main id="dataInputPage" class="container page-container">
    <div class="top-selections">
      <section class="selection-block compact">
        <h2>ATEX Selection</h2>
        <div class="button-group">
          <button class="option-btn active" data-group="atex" data-value="Non-ATEX">Non-ATEX</button>
          <button class="option-btn" data-group="atex" data-value="ATEX">ATEX</button>
        </div>
      </section>

      <section class="selection-block compact">
        <h2>Food Selection</h2>
        <div class="button-group">
          <button class="option-btn active" data-group="food" data-value="Non-food">Non-food</button>
          <button class="option-btn" data-group="food" data-value="Food">Food</button>
        </div>
      </section>

      <section class="selection-block compact">
        <h2>Orientation</h2>
        <div class="button-group">
          <button class="option-btn active" data-group="orientation" data-value="Vertical">Vertical</button>
          <button class="option-btn" data-group="orientation" data-value="Horizontal">Horizontal</button>
        </div>
      </section>
    </div>

    <div class="summary">
      <strong>SELECTION:</strong>
      <span id="summaryText">Standard</span>
    </div>

    <div class="section-divider"></div>

    <section class="selection-block">
      <h2>Flow rate</h2>

      <div class="flow-grid">
        <div>
          <label>Q (l/min)</label>
          <input id="flowLMin" type="text" inputmode="decimal" placeholder="l/min" />
        </div>

        <div>
          <label>Q (l/h)</label>
          <input id="flowLHour" type="text" inputmode="decimal" placeholder="l/h" />
        </div>

        <div>
          <label>Q (m3/h)</label>
          <input id="flowM3Hour" type="text" inputmode="decimal" placeholder="m3/h" />
        </div>
      </div>
    </section>

    <section class="selection-block">
      <h2>Pressure (bar)</h2>

      <div class="pressure-row">
        <div id="pressureSlider"></div>
        <input id="pressureValue" type="number" min="0" max="24" step="1" value="0" />
      </div>
    </section>

    <button id="calculateRotationBtn" class="calculate-btn">
      CALCULATE ROTATION
    </button>
  </main>

  <section id="rotationPage" class="container page-container hidden">
    <div class="step-bar">
      <span>Data Input</span>
      <span class="step-arrow">&rsaquo;</span>
      <span class="active-step">Rotation Speeds</span>
    </div>

    <h2>Rotation Speeds</h2>
    <div id="rpmStatus" class="status-message" aria-live="polite"></div>

    <table class="rpm-table">
      <thead>
        <tr>
          <th>Pump Type</th>
          <th>RPM</th>
        </tr>
      </thead>
      <tbody id="rpmTableBody"></tbody>
    </table>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/nouislider@15.8.1/dist/nouislider.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.SUPABASE_URL = "";
    window.SUPABASE_ANON_KEY = "";
  </script>
  <script src="script.js"></script>
</body>
</html>
