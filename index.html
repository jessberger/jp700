<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jessberger Pump Selector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div>
      <h1>Jessberger GmbH</h1>
      <p>Eccentric Screw Pump Selector</p>
    </div>

    <img src="images/logo.jpg" alt="Jessberger Logo" class="logo" />
  </header>

  <main class="container">

    <section class="selection-block">
      <h2>ATEX Selection</h2>
      <div class="button-group">
        <button class="option-btn active" data-group="atex" data-value="Non-ATEX">Non-ATEX</button>
        <button class="option-btn" data-group="atex" data-value="ATEX">ATEX</button>
      </div>
    </section>

    <section class="selection-block">
      <h2>Food Selection</h2>
      <div class="button-group">
        <button class="option-btn active" data-group="food" data-value="Non-food">Non-food</button>
        <button class="option-btn" data-group="food" data-value="Food">Food</button>
      </div>
    </section>

    <div class="summary">
      <strong>Seçim:</strong>
      <span id="summaryText">Non-ATEX / Non-food</span>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
